version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: careerpilot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: careerpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerpilot_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/careerpilot
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      APP_ENV: production
      DEBUG: "False"
      ALLOWED_ORIGINS: "http://localhost:8501"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/vector_db:/app/vector_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careerpilot_frontend
    restart: unless-stopped
    environment:
      API_BASE: http://backend:8000/api
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
